# Mosquitto broker — geliştirme yapılandırması
# NOT: Geliştirme için anonim erişim açık. PROD'da kullanıcı/parola + TLS ekleyin.

listener 1883
allow_anonymous true

# MQTT over WebSocket (tarayıcıdan doğrudan bağlanmak istenirse)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

# --- PROD örneği ---
# allow_anonymous false
# password_file /mosquitto/config/passwd
# listener 8883
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile  /mosquitto/config/certs/server.key
