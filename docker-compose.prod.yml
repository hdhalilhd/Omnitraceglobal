## Forklift Telemetri — ÜRETİM (tek VPS) yığını
## Kullanım (VPS'te):  cp .env.prod.example .env  → düzenle  → docker compose -f docker-compose.prod.yml up -d --build
##
## - db     : PostgreSQL + TimescaleDB (veriler kalıcı, online)
## - mqtt   : Mosquitto (ESP32/MQTT yolu için; SIM800L HTTP kullanır, opsiyonel)
## - backend: API + WebSocket + /api/ingest  (cihaz ingest'i için 4000 portu dışarı açık)
## - web    : Caddy → frontend statik + /api,/socket.io reverse-proxy + OTOMATİK HTTPS

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: forklift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: forklift
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forklift -d forklift"]
      interval: 5s
      timeout: 5s
      retries: 12

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mqtt_data:/mosquitto/data
    # Sadece ESP32/MQTT cihazları doğrudan bağlanacaksa portu açın:
    # ports: ["1883:1883"]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://forklift:${POSTGRES_PASSWORD}@db:5432/forklift?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 12h
      MQTT_URL: mqtt://mqtt:1883
      CORS_ORIGIN: https://${DOMAIN}
      INGEST_TOKEN: ${INGEST_TOKEN}
    ports:
      - "4000:4000" # SIM800L (düz HTTP) cihaz ingest'i — http://DOMAIN:4000/api/ingest/...

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  mqtt_data:
  caddy_data:
  caddy_config:
